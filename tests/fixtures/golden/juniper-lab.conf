
Juniper Junos Configuration  (scope: lab)
(other scopes: prod,prod-inner,dmz — use --scope <name> to emit those)
Copy and paste into the device (configure mode):
--------------------------------------------

# Step 1: Create template users (REQUIRED)
set system login class RO-CLASS permissions view
set system login class RO-CLASS permissions view-configuration
set system login user RO-CLASS class RO-CLASS
set system login class OP-CLASS permissions clear
set system login class OP-CLASS permissions network
set system login class OP-CLASS permissions reset
set system login class OP-CLASS permissions trace
set system login class OP-CLASS permissions view
set system login class OP-CLASS permissions view-configuration
set system login user OP-CLASS class OP-CLASS
set system login class RW-CLASS permissions all
set system login user RW-CLASS class RW-CLASS

# Step 2: Configure TACACS+
delete system authentication-order
set system authentication-order tacplus
set system login idle-timeout 60
set system tacplus-server 10.0.0.42 secret lab-secret-0123456789abcdef
set system tacplus-server 10.0.0.42 single-connection
# Optional: pin client source IP for prefix-ACL matching on tacquito.
# Replace 10.0.0.1 with the device's management interface address, e.g.:
#   set system tacplus-server 10.0.0.42 source-address 10.0.0.1
# Accounting events: login + change-log only. 'interactive-commands' is
# intentionally excluded because Junos internal daemons (mgd, jsd,
# health-probe op scripts, etc.) run non-tty CLI commands as root and
# generate a continuous stream of per-command accounting that is pure
# noise on the tacquito side. The login + change-log events still
# capture who logged in and who changed config.
set system accounting events [ login change-log ]
set system accounting destination tacplus

# Step 3: (optional) Per-class command rules
# Per-command authorization (enforced LOCALLY by Junos, not via TACACS+).
# Push these on every device after 'tacctl group commands' changes.
# class 'RO-CLASS' (group 'readonly', default deny)
set system login class RO-CLASS allow-commands "^(show|ping|traceroute)( .*)?$"
# class 'OP-CLASS' (group 'operator', default deny)
set system login class OP-CLASS allow-commands "^(show|ping|traceroute|terminal)( .*)?$"
# class 'RW-CLASS' (group 'superuser', default permit)

# Step 4: (optional) Management ACL
# mgmt-acl empty — configure with 'tacctl config mgmt-acl add <cidr>' on the tacquito server
# to emit a source-restricted lo0 firewall filter here.

# Step 5: Commit
commit

--------------------------------------------
Group → Juniper Class Mapping:
  readonly: RO-CLASS (local: view + view-configuration)
  operator: OP-CLASS (local: clear/network/reset/trace/view + view-configuration)
  superuser: RW-CLASS (local: all)

Notes:
  - Template users MUST exist before TACACS+ logins will work
  - With authentication-order 'tacplus', Junos auto-falls-back to
    local password ONLY when the tacplus server is unreachable —
    a tacplus reject does not fall through to local
  - If a login fails silently, the template user is likely missing
  - Each template-user is bound to a LOCAL class of the same name;
    edit its 'permissions' to fit your policy (Junos refuses to set
    permissions on the predefined read-only/operator/super-user names)
  - Uncomment and edit the source-address line to pin the client
    source IP for prefix-ACL matching on tacquito
  - Junos replaces the plaintext 'secret' with '$9$...' on commit,
    but it sits in the candidate config until then — commit promptly
    and protect the commit archive (/config/rescue.conf, juniper.conf.*).
  - Using template: /home/rett/tacctl/config/templates/juniper.template

Verify after commit:
  show configuration system tacplus-server
  show configuration system authentication-order
  show configuration system login user RO-CLASS
  show configuration system login user OP-CLASS
  show configuration system login user RW-CLASS

